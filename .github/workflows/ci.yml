name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Preview
        uses: crazyurus/miniprogram-action@2.0.0
        with:
          action_type: preview
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          MINI_APPID: ${{ secrets.MINI_APPID }}

  upload:
    name: Upload
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Upload
        uses: crazyurus/miniprogram-action@2.0.0
        with:
          action_type: upload
          version: ${{ github.run_number }}.0
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          MINI_APPID: ${{ secrets.MINI_APPID }}

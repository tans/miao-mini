name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  upload:
    name: Upload
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && npm install miniprogram-ci --save-dev

      - name: Prepare private key
        run: |
          echo "${{ secrets.MINI_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > ./private_key
          chmod 600 ./private_key

      - name: Upload
        run: node scripts/ci-upload.js
        env:
          MINI_APPID: ${{ secrets.MINI_APPID }}
          PRIVATE_KEY_PATH: ${{ github.workspace }}/private_key
          VERSION: ${{ github.run_number }}.0
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
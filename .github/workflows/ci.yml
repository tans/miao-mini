name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare private key
        run: echo "${{ secrets.PRIVATE_KEY }}" > private_key

      - name: Download DevTools
        run: |
          mkdir -p ./miniprogram-dev
          cd ./miniprogram-dev
          wget -q https://servicewechat.com/wxa-dev/logicmgmt_mp_build/latest/build.yml -O build.yml
          wget -q $(grep url build.yml | head -1 | cut -d'"' -f4) -O cli.tar.gz
          tar xzf cli.tar.gz
          ls -la

      - name: Preview
        run: |
          cd miniprogram-dev
          ./devtools-cli preview \
            --project ../ \
            --app-id ${{ secrets.MINI_APPID }} \
            --private-key-path ../private_key \
            --version ${{ github.run_number }} \
            --qr-code-output-path ./qrcode.txt

  upload:
    name: Upload
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare private key
        run: echo "${{ secrets.PRIVATE_KEY }}" > private_key

      - name: Download DevTools
        run: |
          mkdir -p ./.miniprogram-dev
          cd ./.miniprogram-dev
          wget -q https://servicewechat.com/wxa-dev/logicmgmt_mp_build/latest/build.yml -O build.yml
          wget -q $(grep url build.yml | head -1 | cut -d'"' -f4) -O cli.tar.gz
          tar xzf cli.tar.gz

      - name: Upload
        run: |
          cd ./.miniprogram-dev
          ./devtools-cli upload \
            --project ../ \
            --app-id ${{ secrets.MINI_APPID }} \
            --private-key-path ../private_key \
            --version ${{ github.run_number }}.0
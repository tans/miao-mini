name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download WeChat DevTools
        run: |
          wget -q https://servicewechat.com/wxa-dev/logicmgmt_mp_build/latest/build.yml -O build.yml
          echo "Build config downloaded"

      - name: Preview
        uses: wechat-mini-program/minigame-actions/preview@v1
        with:
          type: miniProgram
          appid: ${{ secrets.MINI_APPID }}
          private-key: ${{ secrets.MINI_PRIVATE_KEY }}
          version: ${{ github.run_number }}
          desc: 'Preview from CI'

  upload:
    name: Upload
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Upload
        uses: wechat-mini-program/minigame-actions/upload@v1
        with:
          type: miniProgram
          appid: ${{ secrets.MINI_APPID }}
          private-key: ${{ secrets.MINI_PRIVATE_KEY }}
          version: ${{ github.run_number }}.0
          desc: ${{ github.event.head_commit.message }}
